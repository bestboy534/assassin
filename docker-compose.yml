x-backend-environment: &backend-environment
  APP_ENVIRONMENT: local
  ENABLE_DATABASE: "true"
  DATABASE_URL: postgresql+asyncpg://assassin:local_only@postgres:5432/assassin
  AUTO_CREATE_SCHEMA: "false"
  QUEUE_BACKEND: redis
  REDIS_URL: redis://redis:6379/0
  STORAGE_BACKEND: s3
  S3_ENDPOINT_URL: http://minio:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY: assassin
  S3_SECRET_KEY: local_minio_only
  S3_BUCKET_QUARANTINE: assassin-quarantine
  S3_BUCKET_FILES: assassin-files
  STORAGE_SIGNING_SECRET: local-compose-only
  INTEGRATION_SECRET_KEY: local-compose-integration-only
  WEBHOOK_SECRET_KEY: local-compose-webhook-only

services:
  backend:
    build:
      context: ./backend
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *backend-environment
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.infrastructure.queue.worker"]
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  webhook-worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.domains.webhooks.worker"]
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assassin
      POSTGRES_USER: assassin
      POSTGRES_PASSWORD: local_only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assassin -d assassin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: assassin
      MINIO_ROOT_PASSWORD: local_minio_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 assassin local_minio_only; do sleep 1; done;
        mc mb --ignore-existing local/assassin-quarantine;
        mc mb --ignore-existing local/assassin-files;

volumes:
  postgres-data:
  redis-data:
  minio-data:
